name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go env
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install just
        run: brew install just

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: just dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./aws-icons.alfredworkflow
